<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificador Mk 3.0 - Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="appContainer">
        <header class="app-header">
            <div class="app-header-title">
                <div class="product-image-placeholder"></div>
                <h1>PRECIFICADOR MK 3.0</h1>
            </div>
            <div class="header-social-links">
                <button id="themeToggle" class="theme-toggle-button">Tema Escuro</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'tab-reversa')">Simular Venda</button>
            <button class="tab-button" onclick="openTab(event, 'tab-ideal')">Preço Ideal</button>
            <button class="tab-button" onclick="openTab(event, 'tab-compare')">Comparativo</button>
        </div>

        <section id="tab-reversa" class="calc-section tab-content active">
            <div class="input-group highlight-bg">
                <label for="exposureType">Canal de Venda:</label>
                <select id="exposureType">
                    <option value="Offline">Venda Direta</option>
                    <option value="Classico">Mercado Livre (Clássico)</option>
                    <option value="Premium">Mercado Livre (Premium)</option>
                    <option value="Shopee">Shopee</option>
                </select>
            </div>
            <div class="input-row">
                <div class="input-group"><label>Preço de Venda (R$)</label><input type="number" id="r_saleValue" step="0.01" value="100.00"></div>
                <div class="input-group"><label>Custo Unitário (R$)</label><input type="number" id="r_unitCost" step="0.01" value="30.00"></div>
            </div>
            <div class="input-row">
                <div class="input-group"><label>Frete Pago pelo Vendedor (R$)</label><input type="number" id="r_shipping" step="0.01" value="0.00"></div>
                <div class="input-group"><label>Impostos (%)</label><input type="number" id="r_taxPerc" step="0.01" value="6.00"></div>
            </div>
            
            <div class="metrics-box">
                <p>Taxas do Canal: <span id="r_channelFees">R$ 0.00</span></p>
                <p>Impostos: <span id="r_taxValue">R$ 0.00</span></p>
                <hr>
                <p>Lucro Líquido (=)</p>
                <h2 class="highlight" id="r_marginValue">R$ 0.00</h2>
                <h3 class="highlight-percentage" id="r_marginPerc">0.00%</h3>
            </div>
        </section>

        <section id="tab-ideal" class="calc-section tab-content" style="display:none;">
            <div class="input-group highlight-bg">
                <label for="i_exposureType">Canal Alvo:</label>
                <select id="i_exposureType">
                    <option value="Offline">Venda Direta</option>
                    <option value="Classico">Mercado Livre (Clássico)</option>
                    <option value="Premium">Mercado Livre (Premium)</option>
                    <option value="Shopee">Shopee</option>
                </select>
            </div>
            <div class="input-row">
                <div class="input-group"><label>Margem Desejada (%)</label><input type="number" id="i_targetMargin" step="0.01" value="20.00"></div>
                <div class="input-group"><label>Custo Unitário (R$)</label><input type="number" id="i_unitCost" step="0.01" value="30.00"></div>
            </div>
            <div class="input-row">
                <div class="input-group"><label>Frete Fixo (R$)</label><input type="number" id="i_shipping" step="0.01" value="0.00"></div>
                <div class="input-group"><label>Impostos (%)</label><input type="number" id="i_taxPerc" step="0.01" value="6.00"></div>
            </div>

            <div class="metrics-box">
                <p>Sugestão de Preço de Venda (=)</p>
                <h2 class="highlight" id="i_suggestedPrice">R$ 0.00</h2>
                <p class="subtext">Para atingir exatos <span id="i_displayTarget">0%</span> de lucro líquido.</p>
            </div>
        </section>

        <section id="tab-compare" class="calc-section tab-content" style="display:none;">
            <div class="input-row">
                <div class="input-group"><label>Margem Desejada (%)</label><input type="number" id="c_targetMargin" step="0.01" value="20.00"></div>
                <div class="input-group"><label>Custo Total Base (R$)</label><input type="number" id="c_unitCost" step="0.01" value="30.00"></div>
            </div>
            <table class="comparison-table" id="comparisonTable">
                <thead>
                    <tr>
                        <th>Canal</th>
                        <th>Preço Sugerido</th>
                        <th>Taxas Totais</th>
                        <th>Lucro R$</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
